spring.application.name=api-gateway
server.port=10000

spring.cloud.gateway.server.webmvc.routes[0].id=core-auth
spring.cloud.gateway.server.webmvc.routes[0].uri=https://sigle-coreservice.onrender.com
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=core-establecimientos
spring.cloud.gateway.server.webmvc.routes[1].uri=https://sigle-coreservice.onrender.com
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/establecimientos/**

spring.cloud.gateway.server.webmvc.routes[2].id=core-notificaciones
spring.cloud.gateway.server.webmvc.routes[2].uri=https://sigle-coreservice.onrender.com
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/notificaciones/**

spring.cloud.gateway.server.webmvc.routes[3].id=core-dashboard
spring.cloud.gateway.server.webmvc.routes[3].uri=https://sigle-coreservice.onrender.com
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/dashboard/**

spring.cloud.gateway.server.webmvc.routes[4].id=listas-service
spring.cloud.gateway.server.webmvc.routes[4].uri=https://sigle-listasservice.onrender.com
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/listas/**

spring.cloud.gateway.server.webmvc.routes[5].id=citas-service
spring.cloud.gateway.server.webmvc.routes[5].uri=https://sigle-citasservice.onrender.com
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/citas/**

spring.cloud.gateway.server.webmvc.routes[6].id=pacientes-service
spring.cloud.gateway.server.webmvc.routes[6].uri=https://sigle-pacientesservice.onrender.com
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/api/pacientes/**

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.coreCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.coreCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.coreCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.coreCircuitBreaker.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.citasCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.citasCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.citasCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.citasCircuitBreaker.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.listasCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.listasCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.listasCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.listasCircuitBreaker.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.pacientesCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.pacientesCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.pacientesCircuitBreaker.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.pacientesCircuitBreaker.permitted-number-of-calls-in-half-open-state=3